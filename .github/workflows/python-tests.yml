name: Python Tests

on:
  push:
    branches: [main]
    paths:
      - "sdk/python/**"
      - "tests/**"
      - "pyproject.toml"
  pull_request:
    branches: [main]
    paths:
      - "sdk/python/**"
      - "tests/**"
      - "pyproject.toml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest pytest-asyncio

      - name: Verify all 31 packages import
        working-directory: sdk/python
        run: |
          python3 -c "
          packages = [
              'nqpu.core', 'nqpu.metal', 'nqpu.physics', 'nqpu.ion_trap',
              'nqpu.superconducting', 'nqpu.neutral_atom', 'nqpu.benchmarks',
              'nqpu.optimizers', 'nqpu.transpiler', 'nqpu.simulation',
              'nqpu.tensor_networks', 'nqpu.qcl', 'nqpu.error_correction',
              'nqpu.mitigation', 'nqpu.tomography', 'nqpu.qrng', 'nqpu.chem',
              'nqpu.bio', 'nqpu.finance', 'nqpu.trading', 'nqpu.qkd',
              'nqpu.games', 'nqpu.emulator', 'nqpu.bridges', 'nqpu.web',
              'nqpu.calibration', 'nqpu.classical_inspired', 'nqpu.crypto',
              'nqpu.dashboard', 'nqpu.education', 'nqpu.visualization',
          ]
          failed = []
          for pkg in packages:
              try:
                  __import__(pkg)
              except Exception as e:
                  failed.append(f'{pkg}: {e}')
          if failed:
              print('FAILED IMPORTS:')
              for f in failed:
                  print(f'  {f}')
              exit(1)
          print(f'All {len(packages)} packages imported successfully')
          "

      - name: Run test suite
        working-directory: sdk/python
        run: python3 -m pytest ../../tests/ -v --tb=short -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check syntax
        working-directory: sdk/python
        run: python3 -m py_compile nqpu/__init__.py
