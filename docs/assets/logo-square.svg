<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="textGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#7b68ee"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="256" height="256" fill="url(#bgGrad)" rx="24"/>
  <g opacity="0.12" stroke="#00d4ff" stroke-width="0.8">
    <line x1="30" y1="50" x2="226" y2="50"/>
    <line x1="30" y1="206" x2="226" y2="206"/>
    <circle cx="60" cy="50" r="3" fill="none"/>
    <circle cx="196" cy="50" r="3" fill="none"/>
    <circle cx="60" cy="206" r="3" fill="none"/>
    <circle cx="196" cy="206" r="3" fill="none"/>
  </g>
  <text x="128" y="145"
        font-family="Jacquard 24, cursive"
        font-size="80"
        fill="#00d4ff"
        text-anchor="middle"
        opacity="0.3"
        filter="url(#softGlow)">
    nQPU
  </text>
  <text x="128" y="145"
        font-family="Jacquard 24, cursive"
        font-size="80"
        fill="url(#textGlow)"
        text-anchor="middle"
        filter="url(#glow)">
    nQPU
  </text>
  <text x="128" y="175"
        font-family="Courier New, monospace"
        font-size="9"
        fill="#888888"
        text-anchor="middle"
        letter-spacing="4">
    QUANTUM PROCESSING UNIT
  </text>
</svg>
